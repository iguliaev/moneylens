name: Finalize Release

on:
  pull_request:
    types: [closed]
    branches: [release]

permissions:
  contents: write

concurrency:
  group: finalize-release-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Parse release version from PR title
        id: version
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const title = context.payload.pull_request?.title ?? "";
            const match = title.match(/^release:\s*(v\d+\.\d+\.\d+)$/);

            if (!match) {
              core.notice(`PR title does not match release pattern: "${title}". Skipping.`);
              return "";
            }

            core.info(`Detected release version: ${match[1]}`);
            return match[1];

      - name: No-op for non-release PR title
        if: steps.version.outputs.result == ''
        run: echo "No release version detected in PR title; nothing to do."

      - name: Create annotated tag on merge commit when missing
        if: steps.version.outputs.result != ''
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const version = process.env.VERSION;
            const mergeCommitSha = context.payload.pull_request?.merge_commit_sha;
            const refName = `tags/${version}`;

            if (!mergeCommitSha) {
              core.setFailed("Missing merge_commit_sha on pull_request event.");
              return;
            }

            try {
              await github.rest.git.getRef({ owner, repo, ref: refName });
              core.notice(`Tag ${version} already exists. Skipping tag creation.`);
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const tagObject = await github.rest.git.createTag({
              owner,
              repo,
              tag: version,
              message: `release: ${version}`,
              object: mergeCommitSha,
              type: "commit",
              tagger: {
                name: "github-actions[bot]",
                email: "41898282+github-actions[bot]@users.noreply.github.com",
                date: new Date().toISOString()
              }
            });

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/tags/${version}`,
                sha: tagObject.data.sha
              });
              core.info(`Created annotated tag ${version} on commit ${mergeCommitSha}.`);
            } catch (error) {
              if (error.status === 422) {
                core.notice(`Tag ${version} was created concurrently. Continuing.`);
                return;
              }
              throw error;
            }

      - name: Create GitHub Release when missing
        if: steps.version.outputs.result != ''
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.result }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const version = process.env.VERSION;

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag: version });
              core.notice(`Release for ${version} already exists. Skipping release creation.`);
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: version,
              target_commitish: "release",
              name: version,
              generate_release_notes: true
            });

            core.info(`Created GitHub Release for ${version}.`);
